<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetKart | Premium Pet Care & Nutrition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#00d2ff', // Vibrant PetKart Cyan
              gold: '#ff9d00',    // Vibrant PetKart Orange
              coral: '#fb7185',   // Warm Coral
              hover: '#00b8e6',
            },
            dark: {
              950: '#050505',
              900: '#0a0a0a',
              800: '#121212',
              700: '#1a1a1a',
              600: '#262626'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif']
          },
          animation: {
            'aura-drift': 'aura-drift 20s infinite alternate',
            'glow-pulse': 'glow-pulse 3s infinite',
            'fade-in': 'fade-in 0.8s ease-out',
            'slide-up': 'slide-up 0.6s ease-out'
          },
          keyframes: {
            'aura-drift': {
              '0%': { transform: 'translate(0, 0) scale(1)' },
              '100%': { transform: 'translate(5%, 10%) scale(1.1)' },
            },
            'glow-pulse': {
              '0%, 100%': { opacity: 0.3, filter: 'blur(25px)' },
              '50%': { opacity: 0.5, filter: 'blur(45px)' },
            },
            'fade-in': {
              '0%': { opacity: 0 },
              '100%': { opacity: 1 },
            },
            'slide-up': {
              '0%': { transform: 'translateY(20px)', opacity: 0 },
              '100%': { transform: 'translateY(0)', opacity: 1 },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #050505;
      color: #f4f4f5;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    .glass {
      background: rgba(15, 15, 15, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .aura-gradient-text {
      background: linear-gradient(135deg, #00d2ff 0%, #ff9d00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .aura-btn {
      background: linear-gradient(135deg, #00d2ff 0%, #0099cc 100%);
      box-shadow: 0 10px 30px -10px rgba(0, 210, 255, 0.4);
    }
    .aura-btn:hover {
      background: linear-gradient(135deg, #0099cc 0%, #ff9d00 100%);
      box-shadow: 0 15px 40px -10px rgba(255, 157, 0, 0.3);
    }
    .aura-card-border {
      position: relative;
    }
    .aura-card-border::after {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(135deg, rgba(0, 210, 255, 0.3), rgba(255, 157, 0, 0.3));
      border-radius: inherit;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .aura-card-border:hover::after {
      opacity: 1;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #050505; }
    ::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "axios": "https://esm.sh/axios@^1.13.2",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-router": "https://esm.sh/react-router@^7.12.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="dark text-zinc-100">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
